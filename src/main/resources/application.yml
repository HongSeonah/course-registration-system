spring:
  application:
    name: course-registration-system
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/course_registration_system?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}
